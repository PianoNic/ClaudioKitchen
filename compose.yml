services:
  openrouter-mcp:
    # Pull the image published by the GitHub Actions workflow. Make the GHCR
    # package public, or run `docker login ghcr.io`, so the pull succeeds.
    image: ghcr.io/pianonic/claudiokitchen:latest
    # To build from source instead, comment out `image:` above and use:
    # build: .
    env_file: .env
    ports:
      # Published on all host interfaces. If your reverse proxy (Traefik/Caddy/
      # Pangolin) runs on THIS host, bind to loopback so nothing reaches the app
      # except through TLS:  "127.0.0.1:3417:8000"
      - "3417:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
